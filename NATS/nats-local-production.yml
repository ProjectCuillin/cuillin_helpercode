---
- name: Install and harden NATS Server locally on Oracle Linux or Debian
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    # Pin versions for reproducibility. Change only after validation in a lower environment.
    nats_version: "2.14.0"
    nats_cli_version: "0.4.0"

    # Optional supply-chain checks. Set these to the published SHA-256 values for your approved artifacts.
    # Example format expected by Ansible get_url is generated as sha256:<value>.
    nats_server_sha256: ""
    nats_cli_sha256: ""

    nats_arch_map:
      x86_64: amd64
      aarch64: arm64
      ppc64le: ppc64le
      s390x: s390x
    nats_arch: "{{ nats_arch_map[ansible_architecture] | default(ansible_architecture) }}"

    nats_server_archive_url: "https://github.com/nats-io/nats-server/releases/download/v{{ nats_version }}/nats-server-v{{ nats_version }}-linux-{{ nats_arch }}.tar.gz"
    nats_cli_archive_url: "https://github.com/nats-io/natscli/releases/download/v{{ nats_cli_version }}/nats-{{ nats_cli_version }}-linux-{{ nats_arch }}.zip"

    nats_user: nats
    nats_group: nats
    nats_config_dir: /etc/nats
    nats_tls_dir: /etc/nats/tls
    nats_config_file: /etc/nats/nats-server.conf
    nats_data_root: /var/lib/nats
    nats_data_dir: /var/lib/nats/jetstream
    nats_log_dir: /var/log/nats
    nats_secret_file: /root/nats-production-secrets.env
    nats_nologin_shell: "{{ '/usr/sbin/nologin' if ansible_distribution == 'Debian' else '/sbin/nologin' }}"

    # Bind NATS client traffic to the default-route IPv4 address, not to every interface.
    # Override both values together when the external NIC is not the default route.
    nats_external_interface: "{{ ansible_default_ipv4.interface | default('') }}"
    nats_external_address: "{{ ansible_default_ipv4.address | default('') }}"
    nats_client_host: "{{ nats_external_address }}"
    nats_client_port: 4222
    nats_monitor_host: "127.0.0.1"
    nats_monitor_port: 8222
    nats_monitor_check_host: "{{ '127.0.0.1' if nats_monitor_host in ['0.0.0.0', '::'] else nats_monitor_host }}"

    nats_enable_jetstream: true
    nats_jetstream_domain: "prod"
    nats_max_memory_store: "1Gb"
    nats_max_file_store: "20Gb"
    nats_max_payload: "8Mb"
    nats_max_pending: "64Mb"
    nats_max_connections: 65536

    # Production should use CA-issued certificates. The self-signed mode below creates a local CA and server cert
    # so the deployment is encrypted by default and can be replaced later by enterprise PKI artifacts.
    nats_tls_enabled: true
    nats_tls_self_signed: true
    nats_tls_verify_clients: false
    nats_tls_ca_common_name: "NATS Local Bootstrap CA"
    nats_tls_common_name: "{{ ansible_fqdn | default(ansible_hostname) | default('localhost') }}"
    nats_tls_ca_file: /etc/nats/tls/ca.crt
    nats_tls_ca_key_file: /etc/nats/tls/ca.key
    nats_tls_cert_file: /etc/nats/tls/server.crt
    nats_tls_key_file: /etc/nats/tls/server.key
    nats_tls_cert_days: 825
    nats_tls_ca_days: 3650

    # This baseline uses NATS accounts with bcrypt-hashed passwords in the server config.
    # For larger multi-team estates, consider NATS decentralized JWT/operator mode and manage identities with nsc.
    nats_system_account: SYS
    nats_app_account: APP
    nats_system_user: nats_sys
    nats_app_user: nats_app

    # Optional clustering. For real HA, run at least three NATS servers and define cluster routes.
    # Route URLs should be full NATS route URLs, for example: nats://nats01.example.com:6222
    nats_cluster_enabled: false
    nats_cluster_name: "nats-prod"
    nats_cluster_host: "0.0.0.0"
    nats_cluster_port: 6222
    nats_cluster_routes: []

    nats_manage_firewall: true
    nats_open_monitoring_firewall: false
    # A dedicated firewalld zone is attached to the detected external NIC.
    # Its inbound target is DROP and the playbook removes all allowed inbound entries except SSH and NATS.
    nats_firewall_zone: nats-external
    nats_firewall_allowed_services:
      - ssh
    # For this local single-node baseline, only the NATS client port is exposed externally.
    # Monitoring remains loopback-only by default; clustering adds the route port only when enabled.
    nats_firewall_nats_ports: >-
      {{
        [nats_client_port ~ '/tcp']
        + ((nats_cluster_enabled | bool) | ternary([nats_cluster_port ~ '/tcp'], []))
        + ((nats_open_monitoring_firewall | bool) | ternary([nats_monitor_port ~ '/tcp'], []))
      }}
    nats_firewall_allowed_ports: "{{ nats_firewall_nats_ports }}"
    nats_limit_nofile: 1048576

    nats_base_packages_common:
      - ca-certificates
      - curl
      - gzip
      - tar
      - unzip
      - openssl
      - firewalld
      - logrotate
      - util-linux
    nats_base_packages_redhat:
      - policycoreutils-python-utils
      - python3-libselinux
      - iproute
    nats_base_packages_debian:
      - python3-apt
      - iproute2
    nats_base_packages: "{{ nats_base_packages_common + (nats_base_packages_debian if ansible_distribution == 'Debian' else nats_base_packages_redhat) }}"

  pre_tasks:
    - name: Fail when target is not Oracle Linux or Debian
      ansible.builtin.fail:
        msg: "This playbook supports Oracle Linux and Debian only. Detected {{ ansible_distribution }} {{ ansible_distribution_version }}."
      when:
        - ansible_distribution != 'Debian'
        - "'Oracle' not in ansible_distribution"

    - name: Fail when Oracle Linux package manager is not dnf
      ansible.builtin.fail:
        msg: "Oracle Linux installation requires dnf. Detected package manager '{{ ansible_pkg_mgr }}'."
      when:
        - "'Oracle' in ansible_distribution"
        - ansible_pkg_mgr != 'dnf'

    - name: Fail when Debian package manager is not apt
      ansible.builtin.fail:
        msg: "Debian installation requires apt. Detected package manager '{{ ansible_pkg_mgr }}'."
      when:
        - ansible_distribution == 'Debian'
        - ansible_pkg_mgr != 'apt'

    - name: Fail when NATS service account is not the dedicated nats user
      ansible.builtin.fail:
        msg: "This baseline requires NATS to run as user 'nats' and group 'nats'. Detected nats_user='{{ nats_user }}' nats_group='{{ nats_group }}'."
      when: nats_user != 'nats' or nats_group != 'nats'

    - name: Fail when firewall services are not restricted to SSH
      ansible.builtin.fail:
        msg: "This baseline allows only the ssh firewalld service. Detected services={{ nats_firewall_allowed_services }}."
      when:
        - nats_manage_firewall | bool
        - (nats_firewall_allowed_services | sort) != ['ssh']

    - name: Fail when firewall ports are not restricted to enabled NATS ports
      ansible.builtin.fail:
        msg: "This baseline allows only enabled NATS ports through firewalld. Detected ports={{ nats_firewall_allowed_ports }}, expected={{ nats_firewall_nats_ports }}."
      when:
        - nats_manage_firewall | bool
        - (nats_firewall_allowed_ports | sort) != (nats_firewall_nats_ports | sort)

    - name: Fail when architecture is not mapped to a NATS release artifact
      ansible.builtin.fail:
        msg: "Unsupported architecture {{ ansible_architecture }}. Add it to nats_arch_map if NATS publishes an artifact for it."
      when: nats_arch not in ['amd64', 'arm64', 'ppc64le', 's390x']

    - name: Fail when no default external IPv4 interface was detected
      ansible.builtin.fail:
        msg: "No default-route IPv4 interface/address was detected. Re-run with ANSIBLE_EXTRA_ARGS='-e nats_external_interface=<nic> -e nats_external_address=<ip>'."
      when: nats_external_interface | length == 0 or nats_external_address | length == 0

    - name: Fail when external NATS bind address is loopback or wildcard
      ansible.builtin.fail:
        msg: "Refusing to expose NATS on '{{ nats_client_host }}'. Set nats_external_address to the external NIC IPv4 address."
      when: nats_client_host in ['0.0.0.0', '::', '127.0.0.1', 'localhost'] or nats_client_host is match('^127\.')

  handlers:
    - name: Reload firewalld
      ansible.builtin.command: firewall-cmd --reload
      changed_when: true

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart nats
      ansible.builtin.systemd:
        name: nats
        state: restarted

  tasks:
    - name: Install operating system dependencies
      ansible.builtin.package:
        name: "{{ nats_base_packages }}"
        state: present

    - name: Ensure firewalld is enabled and running
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started
      when: nats_manage_firewall | bool

    - name: Create NATS group
      ansible.builtin.group:
        name: "{{ nats_group }}"
        system: true
        state: present

    - name: Check whether NATS service user already exists
      ansible.builtin.command: "getent passwd {{ nats_user }}"
      register: nats_existing_user
      changed_when: false
      failed_when: nats_existing_user.rc not in [0, 2]

    - name: Create NATS service user when absent
      ansible.builtin.user:
        name: "{{ nats_user }}"
        group: "{{ nats_group }}"
        system: true
        create_home: false
        home: "{{ nats_data_root }}"
        shell: "{{ nats_nologin_shell }}"
        comment: "NATS Server service account"
        state: present
      when: nats_existing_user.rc != 0

    - name: Validate existing NATS service user is not uid 0
      ansible.builtin.assert:
        that:
          - (nats_existing_user.stdout.split(':')[2] | int) != 0
        fail_msg: "Existing user '{{ nats_user }}' has uid 0. Refusing to run NATS with a root-equivalent account."
      when: nats_existing_user.rc == 0

    - name: Create NATS directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ nats_config_dir }}", owner: root, group: "{{ nats_group }}", mode: "0750" }
        - { path: "{{ nats_tls_dir }}", owner: root, group: "{{ nats_group }}", mode: "0750" }
        - { path: "{{ nats_data_root }}", owner: "{{ nats_user }}", group: "{{ nats_group }}", mode: "0750" }
        - { path: "{{ nats_data_dir }}", owner: "{{ nats_user }}", group: "{{ nats_group }}", mode: "0750" }
        - { path: "{{ nats_log_dir }}", owner: "{{ nats_user }}", group: "{{ nats_group }}", mode: "0750" }

    - name: Create temporary installation directory
      ansible.builtin.file:
        path: /var/tmp/nats-install
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download nats-server release archive
      ansible.builtin.get_url:
        url: "{{ nats_server_archive_url }}"
        dest: "/var/tmp/nats-install/nats-server-v{{ nats_version }}-linux-{{ nats_arch }}.tar.gz"
        mode: "0644"
        checksum: "{{ ('sha256:' ~ nats_server_sha256) if (nats_server_sha256 | length > 0) else omit }}"

    - name: Extract nats-server release archive
      ansible.builtin.unarchive:
        src: "/var/tmp/nats-install/nats-server-v{{ nats_version }}-linux-{{ nats_arch }}.tar.gz"
        dest: /var/tmp/nats-install
        remote_src: true
        creates: "/var/tmp/nats-install/nats-server-v{{ nats_version }}-linux-{{ nats_arch }}/nats-server"

    - name: Install nats-server binary
      ansible.builtin.copy:
        src: "/var/tmp/nats-install/nats-server-v{{ nats_version }}-linux-{{ nats_arch }}/nats-server"
        dest: /usr/local/bin/nats-server
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: Restart nats

    - name: Download NATS CLI release archive
      ansible.builtin.get_url:
        url: "{{ nats_cli_archive_url }}"
        dest: "/var/tmp/nats-install/nats-{{ nats_cli_version }}-linux-{{ nats_arch }}.zip"
        mode: "0644"
        checksum: "{{ ('sha256:' ~ nats_cli_sha256) if (nats_cli_sha256 | length > 0) else omit }}"

    - name: Extract NATS CLI release archive
      ansible.builtin.unarchive:
        src: "/var/tmp/nats-install/nats-{{ nats_cli_version }}-linux-{{ nats_arch }}.zip"
        dest: /var/tmp/nats-install
        remote_src: true
        creates: "/var/tmp/nats-install/nats-{{ nats_cli_version }}-linux-{{ nats_arch }}/nats"

    - name: Install NATS CLI binary
      ansible.builtin.copy:
        src: "/var/tmp/nats-install/nats-{{ nats_cli_version }}-linux-{{ nats_arch }}/nats"
        dest: /usr/local/bin/nats
        remote_src: true
        owner: root
        group: root
        mode: "0755"

    - name: Generate local NATS account passwords and bcrypt hashes once
      ansible.builtin.shell: |
        set -euo pipefail
        umask 077

        secret="{{ nats_secret_file }}"

        existing_file_is_valid() {
          [ -f "${secret}" ] || return 1
          grep -Eq "^NATS_SYSTEM_PASSWORD_HASH='[$]2[abxy][$]" "${secret}" || return 1
          grep -Eq "^NATS_APP_PASSWORD_HASH='[$]2[abxy][$]" "${secret}" || return 1
          return 0
        }

        shell_quote() {
          local value="$1"
          printf "'%s'" "$(printf '%s' "${value}" | sed "s/'/'\"'\"'/g")"
        }

        bcrypt_hash() {
          local password="$1"

          if python3 -c 'import bcrypt' >/dev/null 2>&1; then
            BCRYPT_PASSWORD="${password}" python3 - <<'PYBCRYPT'
        import os
        import bcrypt
        password = os.environ["BCRYPT_PASSWORD"].encode("utf-8")
        print(bcrypt.hashpw(password, bcrypt.gensalt(rounds=11)).decode("ascii"))
        PYBCRYPT
            return 0
          fi

          if command -v script >/dev/null 2>&1; then
            # nats server passwd is an interactive command. script(1) gives it a pseudo-TTY for automation.
            printf '%s\n%s\n' "${password}" "${password}" \
              | script -q -c '/usr/local/bin/nats server passwd' /dev/null 2>/dev/null \
              | tr -d '\r' \
              | awk '/^\$2[abxy]\$/ {print; found=1; exit} END {exit found ? 0 : 1}'
            return 0
          fi

          echo "Unable to generate bcrypt hash: neither the Python bcrypt module nor script(1) is available." >&2
          return 1
        }

        if existing_file_is_valid; then
          echo "exists"
          exit 0
        fi

        SYS_PASS="$(openssl rand -hex 24)"
        APP_PASS="$(openssl rand -hex 24)"
        SYS_HASH="$(bcrypt_hash "${SYS_PASS}")"
        APP_HASH="$(bcrypt_hash "${APP_PASS}")"

        if ! [[ "${SYS_HASH}" =~ ^[$]2[abxy][$] ]] || ! [[ "${APP_HASH}" =~ ^[$]2[abxy][$] ]]; then
          echo "Failed to generate valid bcrypt hashes for NATS credentials." >&2
          exit 1
        fi

        tmp="${secret}.tmp"
        {
          printf 'NATS_SYSTEM_USER=%s\n' "$(shell_quote '{{ nats_system_user }}')"
          printf 'NATS_SYSTEM_PASSWORD=%s\n' "$(shell_quote "${SYS_PASS}")"
          printf 'NATS_SYSTEM_PASSWORD_HASH=%s\n' "$(shell_quote "${SYS_HASH}")"
          printf 'NATS_APP_USER=%s\n' "$(shell_quote '{{ nats_app_user }}')"
          printf 'NATS_APP_PASSWORD=%s\n' "$(shell_quote "${APP_PASS}")"
          printf 'NATS_APP_PASSWORD_HASH=%s\n' "$(shell_quote "${APP_HASH}")"
        } > "${tmp}"
        chmod 0600 "${tmp}"
        mv -f "${tmp}" "${secret}"
        chmod 0600 "${secret}"
        echo "created"
      args:
        executable: /bin/bash
      register: nats_secret_generation
      changed_when: "'created' in nats_secret_generation.stdout"

    - name: Read generated bcrypt hashes
      ansible.builtin.shell: |
        set -euo pipefail
        . "{{ nats_secret_file }}"
        printf '%s\n%s\n' "${NATS_SYSTEM_PASSWORD_HASH}" "${NATS_APP_PASSWORD_HASH}"
      args:
        executable: /bin/bash
      register: nats_generated_hashes
      changed_when: false
      no_log: true

    - name: Store generated hash facts
      ansible.builtin.set_fact:
        nats_system_password_hash_effective: "{{ nats_generated_hashes.stdout_lines[0] }}"
        nats_app_password_hash_effective: "{{ nats_generated_hashes.stdout_lines[1] }}"
      no_log: true

    - name: Check TLS certificate presence when not generating self-signed certificates
      ansible.builtin.stat:
        path: "{{ item }}"
      register: nats_tls_files
      loop:
        - "{{ nats_tls_cert_file }}"
        - "{{ nats_tls_key_file }}"
        - "{{ nats_tls_ca_file }}"
      when: nats_tls_enabled | bool and not (nats_tls_self_signed | bool)

    - name: Fail when TLS is enabled but certificate files are missing
      ansible.builtin.fail:
        msg: "TLS is enabled and nats_tls_self_signed=false, but one or more TLS files are missing. Provide cert/key/CA under {{ nats_tls_dir }} or set nats_tls_self_signed=true."
      when:
        - nats_tls_enabled | bool
        - not (nats_tls_self_signed | bool)
        - nats_tls_files.results | selectattr('stat.exists', 'equalto', false) | list | length > 0

    - name: Generate local CA and server certificate for bootstrap TLS
      ansible.builtin.shell: |
        set -euo pipefail
        umask 027
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "${tmpdir}"' EXIT
        {
          printf '%s\n' '[req]'
          printf '%s\n' 'distinguished_name = req_distinguished_name'
          printf '%s\n' 'req_extensions = v3_req'
          printf '%s\n' 'prompt = no'
          printf '%s\n' ''
          printf '%s\n' '[req_distinguished_name]'
          printf '%s\n' 'CN = {{ nats_tls_common_name }}'
          printf '%s\n' ''
          printf '%s\n' '[v3_req]'
          printf '%s\n' 'keyUsage = critical, digitalSignature, keyEncipherment'
          printf '%s\n' 'extendedKeyUsage = serverAuth'
          printf '%s\n' 'subjectAltName = @alt_names'
          printf '%s\n' ''
          printf '%s\n' '[alt_names]'
          printf '%s\n' 'DNS.1 = {{ ansible_fqdn | default(ansible_hostname) | default("localhost") }}'
          printf '%s\n' 'DNS.2 = {{ ansible_hostname | default("localhost") }}'
          printf '%s\n' 'DNS.3 = localhost'
          printf '%s\n' 'IP.1 = 127.0.0.1'
          {% if nats_external_address | length > 0 %}printf '%s\n' 'IP.2 = {{ nats_external_address }}'{% endif %}
        } > "${tmpdir}/server.cnf"

        openssl genrsa -out "{{ nats_tls_ca_key_file }}" 4096
        openssl req -x509 -new -nodes \
          -key "{{ nats_tls_ca_key_file }}" \
          -sha256 \
          -days "{{ nats_tls_ca_days }}" \
          -out "{{ nats_tls_ca_file }}" \
          -subj "/CN={{ nats_tls_ca_common_name }}"

        openssl genrsa -out "{{ nats_tls_key_file }}" 2048
        openssl req -new \
          -key "{{ nats_tls_key_file }}" \
          -out "${tmpdir}/server.csr" \
          -config "${tmpdir}/server.cnf"

        openssl x509 -req \
          -in "${tmpdir}/server.csr" \
          -CA "{{ nats_tls_ca_file }}" \
          -CAkey "{{ nats_tls_ca_key_file }}" \
          -CAcreateserial \
          -out "{{ nats_tls_cert_file }}" \
          -days "{{ nats_tls_cert_days }}" \
          -sha256 \
          -extensions v3_req \
          -extfile "${tmpdir}/server.cnf"

        chown root:{{ nats_group }} "{{ nats_tls_ca_file }}" "{{ nats_tls_cert_file }}" "{{ nats_tls_key_file }}" "{{ nats_tls_ca_key_file }}"
        chmod 0644 "{{ nats_tls_ca_file }}" "{{ nats_tls_cert_file }}"
        chmod 0640 "{{ nats_tls_key_file }}" "{{ nats_tls_ca_key_file }}"
      args:
        executable: /bin/bash
        creates: "{{ nats_tls_cert_file }}"
      when: nats_tls_enabled | bool and nats_tls_self_signed | bool
      notify: Restart nats

    - name: Install NATS server configuration
      ansible.builtin.copy:
        dest: "{{ nats_config_file }}"
        owner: root
        group: "{{ nats_group }}"
        mode: "0640"
        content: |
          # Managed by Ansible. Do not edit directly.
          # Production baseline: non-root service, TLS, accounts, JetStream, monitoring on loopback.

          server_name: "{{ ansible_hostname | default('localhost') }}"
          host: "{{ nats_client_host }}"
          port: {{ nats_client_port }}

          pid_file: "/run/nats/nats-server.pid"
          log_file: "{{ nats_log_dir }}/nats-server.log"
          logtime: true
          debug: false
          trace: false

          max_connections: {{ nats_max_connections }}
          max_payload: {{ nats_max_payload }}
          max_pending: {{ nats_max_pending }}
          write_deadline: "10s"

          http_host: "{{ nats_monitor_host }}"
          http_port: {{ nats_monitor_port }}

          {% if nats_tls_enabled | bool %}
          tls {
            cert_file: "{{ nats_tls_cert_file }}"
            key_file: "{{ nats_tls_key_file }}"
            ca_file: "{{ nats_tls_ca_file }}"
            timeout: 2
            verify: {{ nats_tls_verify_clients | bool | lower }}
          }
          {% endif %}

          {% if nats_enable_jetstream | bool %}
          jetstream {
            store_dir: "{{ nats_data_dir }}"
            max_memory_store: {{ nats_max_memory_store }}
            max_file_store: {{ nats_max_file_store }}
            domain: "{{ nats_jetstream_domain }}"
          }
          {% endif %}

          accounts {
            {{ nats_system_account }} {
              users: [
                { user: "{{ nats_system_user }}", password: "{{ nats_system_password_hash_effective }}" }
              ]
            }

            {{ nats_app_account }} {
              {% if nats_enable_jetstream | bool %}jetstream: enabled{% endif %}
              users: [
                {
                  user: "{{ nats_app_user }}"
                  password: "{{ nats_app_password_hash_effective }}"
                  permissions: {
                    publish: { allow: [">"] }
                    subscribe: { allow: [">"] }
                  }
                }
              ]
            }
          }

          system_account: {{ nats_system_account }}

          {% if nats_cluster_enabled | bool %}
          cluster {
            name: "{{ nats_cluster_name }}"
            host: "{{ nats_cluster_host }}"
            port: {{ nats_cluster_port }}
            {% if nats_cluster_routes | length > 0 %}
            routes: [
          {% for route in nats_cluster_routes %}
              "{{ route }}"{% if not loop.last %},{% endif %}
          {% endfor %}
            ]
            {% endif %}
          }
          {% endif %}
      notify: Restart nats

    - name: Validate NATS server configuration as nats user
      ansible.builtin.command: "/usr/sbin/runuser -u {{ nats_user }} -g {{ nats_group }} -- /usr/local/bin/nats-server -c {{ nats_config_file }} -t"
      changed_when: false

    - name: Install systemd unit for NATS
      ansible.builtin.copy:
        dest: /etc/systemd/system/nats.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=NATS Server
          Documentation=https://docs.nats.io/
          Wants=network-online.target
          After=network-online.target
          RequiresMountsFor={{ nats_data_root }}

          [Service]
          Type=simple
          User={{ nats_user }}
          Group={{ nats_group }}
          WorkingDirectory={{ nats_data_root }}
          UMask=0027
          ExecStartPre=/usr/local/bin/nats-server -c {{ nats_config_file }} -t
          ExecStart=/usr/local/bin/nats-server -c {{ nats_config_file }}
          ExecReload=/bin/kill -HUP $MAINPID
          Restart=on-failure
          RestartSec=5s
          TimeoutStopSec=120
          KillSignal=SIGINT
          LimitNOFILE={{ nats_limit_nofile }}
          RuntimeDirectory=nats
          RuntimeDirectoryMode=0750
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectHome=true
          ProtectSystem=strict
          ReadWritePaths={{ nats_data_root }} {{ nats_log_dir }} /run/nats
          CapabilityBoundingSet=
          LockPersonality=true
          MemoryDenyWriteExecute=false
          ProtectKernelTunables=true
          ProtectKernelModules=true
          ProtectControlGroups=true
          RestrictSUIDSGID=true
          SystemCallArchitectures=native

          [Install]
          WantedBy=multi-user.target
      notify:
        - Reload systemd
        - Restart nats

    - name: Install system security limits for NATS user
      ansible.builtin.copy:
        dest: /etc/security/limits.d/90-nats.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          {{ nats_user }} soft nofile {{ nats_limit_nofile }}
          {{ nats_user }} hard nofile {{ nats_limit_nofile }}

    - name: Install logrotate policy for NATS logs
      ansible.builtin.copy:
        dest: /etc/logrotate.d/nats
        owner: root
        group: root
        mode: "0644"
        content: |
          {{ nats_log_dir }}/*.log {
              daily
              rotate 14
              missingok
              notifempty
              compress
              delaycompress
              copytruncate
              create 0640 {{ nats_user }} {{ nats_group }}
          }

    - name: Check whether dedicated firewalld zone already exists
      ansible.builtin.command: "firewall-cmd --permanent --get-zones"
      register: nats_firewall_zones
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Create dedicated firewalld zone for external NATS interface
      ansible.builtin.command: "firewall-cmd --permanent --new-zone={{ nats_firewall_zone }}"
      when:
        - nats_manage_firewall | bool
        - nats_firewall_zone not in nats_firewall_zones.stdout.split()
      notify: Reload firewalld

    - name: Attach external interface to dedicated firewalld zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --change-interface={{ nats_external_interface }}"
      register: nats_firewall_interface_change
      changed_when: "'success' in nats_firewall_interface_change.stdout"
      when: nats_manage_firewall | bool
      notify: Reload firewalld

    - name: Set dedicated firewalld zone target to DROP
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --set-target=DROP"
      register: nats_firewall_drop_target
      changed_when: "'success' in nats_firewall_drop_target.stdout"
      when: nats_manage_firewall | bool
      notify: Reload firewalld

    - name: Read current permanent firewalld services in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --list-services"
      register: nats_firewall_current_services
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Remove all inbound firewalld services except explicitly allowed services
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --remove-service={{ item }}"
      loop: "{{ nats_firewall_current_services.stdout.split() | difference(nats_firewall_allowed_services) }}"
      when: nats_manage_firewall | bool
      notify: Reload firewalld

    - name: Ensure explicitly allowed firewalld services are present
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --add-service={{ item }}"
      loop: "{{ nats_firewall_allowed_services }}"
      register: nats_firewall_add_service
      changed_when: "'success' in nats_firewall_add_service.stdout"
      when: nats_manage_firewall | bool
      notify: Reload firewalld

    - name: Read current permanent firewalld ports in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --list-ports"
      register: nats_firewall_current_ports
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Remove all inbound firewalld ports except explicitly allowed ports
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --remove-port={{ item }}"
      loop: "{{ nats_firewall_current_ports.stdout.split() | difference(nats_firewall_allowed_ports) }}"
      when: nats_manage_firewall | bool
      notify: Reload firewalld

    - name: Ensure explicitly allowed firewalld ports are present
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --add-port={{ item }}"
      loop: "{{ nats_firewall_allowed_ports }}"
      register: nats_firewall_add_port
      changed_when: "'success' in nats_firewall_add_port.stdout"
      when: nats_manage_firewall | bool
      notify: Reload firewalld

    - name: Read current permanent firewalld source ports in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --list-source-ports"
      register: nats_firewall_current_source_ports
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Remove all firewalld source ports in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --remove-source-port={{ item }}"
      loop: "{{ nats_firewall_current_source_ports.stdout.split() }}"
      when: nats_manage_firewall | bool
      notify: Reload firewalld

    - name: Read current permanent firewalld protocols in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --list-protocols"
      register: nats_firewall_current_protocols
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Remove all firewalld protocols in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --remove-protocol={{ item }}"
      loop: "{{ nats_firewall_current_protocols.stdout.split() }}"
      when: nats_manage_firewall | bool
      notify: Reload firewalld

    - name: Read current permanent firewalld rich rules in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --list-rich-rules"
      register: nats_firewall_current_rich_rules
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Remove all firewalld rich rules in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --remove-rich-rule={{ item | quote }}"
      loop: "{{ nats_firewall_current_rich_rules.stdout_lines }}"
      when:
        - nats_manage_firewall | bool
        - item | length > 0
      notify: Reload firewalld

    - name: Read current permanent firewalld forward ports in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --list-forward-ports"
      register: nats_firewall_current_forward_ports
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Remove all firewalld forward ports in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --remove-forward-port={{ item }}"
      loop: "{{ nats_firewall_current_forward_ports.stdout.split() }}"
      when: nats_manage_firewall | bool
      notify: Reload firewalld

    - name: Disable firewalld masquerading in dedicated zone
      ansible.builtin.command: "firewall-cmd --permanent --zone={{ nats_firewall_zone }} --remove-masquerade"
      register: nats_firewall_remove_masquerade
      failed_when: nats_firewall_remove_masquerade.rc not in [0, 11, 12]
      changed_when: nats_firewall_remove_masquerade.rc == 0
      when: nats_manage_firewall | bool
      notify: Reload firewalld

    - name: Apply pending handlers before service validation
      ansible.builtin.meta: flush_handlers

    - name: Enable and start NATS service
      ansible.builtin.systemd:
        name: nats
        enabled: true
        state: started
        daemon_reload: true

    - name: Validate NATS service is active
      ansible.builtin.command: systemctl is-active nats
      register: nats_active
      changed_when: false

    - name: Validate NATS service is enabled for reboot persistence
      ansible.builtin.command: systemctl is-enabled nats
      register: nats_enabled
      changed_when: false
      failed_when: nats_enabled.stdout != 'enabled'

    - name: Validate systemd runs NATS as the dedicated service user
      ansible.builtin.command: systemctl show nats --property=User --property=Group
      register: nats_systemd_identity
      changed_when: false
      failed_when: "('User=' ~ nats_user) not in nats_systemd_identity.stdout or ('Group=' ~ nats_group) not in nats_systemd_identity.stdout"

    - name: Validate nats-server is not running as root
      ansible.builtin.shell: "ps -o user= -C nats-server | awk '{print $1}' | sort -u"
      args:
        executable: /bin/bash
      register: nats_process_users
      changed_when: false
      failed_when: "'root' in nats_process_users.stdout.split() or nats_user not in nats_process_users.stdout.split()"

    - name: Validate NATS is listening on the external address and not on all interfaces
      ansible.builtin.shell: |
        set -euo pipefail
        ss -ltnp | awk '$4 ~ /:{{ nats_client_port }}$/ {print $4}'
      args:
        executable: /bin/bash
      register: nats_listen_addresses
      changed_when: false
      failed_when:
        - (nats_client_host ~ ':' ~ nats_client_port) not in nats_listen_addresses.stdout
          or ('0.0.0.0:' ~ nats_client_port) in nats_listen_addresses.stdout
          or ('[::]:' ~ nats_client_port) in nats_listen_addresses.stdout

    - name: Read runtime firewalld zone configuration
      ansible.builtin.command: "firewall-cmd --zone={{ nats_firewall_zone }} --list-all"
      register: nats_firewall_runtime
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Read runtime firewalld services in dedicated zone
      ansible.builtin.command: "firewall-cmd --zone={{ nats_firewall_zone }} --list-services"
      register: nats_firewall_runtime_services
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Read runtime firewalld ports in dedicated zone
      ansible.builtin.command: "firewall-cmd --zone={{ nats_firewall_zone }} --list-ports"
      register: nats_firewall_runtime_ports
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Read runtime firewalld source ports in dedicated zone
      ansible.builtin.command: "firewall-cmd --zone={{ nats_firewall_zone }} --list-source-ports"
      register: nats_firewall_runtime_source_ports
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Read runtime firewalld protocols in dedicated zone
      ansible.builtin.command: "firewall-cmd --zone={{ nats_firewall_zone }} --list-protocols"
      register: nats_firewall_runtime_protocols
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Read runtime firewalld rich rules in dedicated zone
      ansible.builtin.command: "firewall-cmd --zone={{ nats_firewall_zone }} --list-rich-rules"
      register: nats_firewall_runtime_rich_rules
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Read runtime firewalld forward ports in dedicated zone
      ansible.builtin.command: "firewall-cmd --zone={{ nats_firewall_zone }} --list-forward-ports"
      register: nats_firewall_runtime_forward_ports
      changed_when: false
      when: nats_manage_firewall | bool

    - name: Validate firewalld external zone permits only SSH and NATS traffic
      ansible.builtin.assert:
        that:
          - "'target: DROP' in nats_firewall_runtime.stdout"
          - "'interfaces:' in nats_firewall_runtime.stdout and nats_external_interface in nats_firewall_runtime.stdout"
          - "(nats_firewall_runtime_services.stdout.split() | difference(nats_firewall_allowed_services) | length) == 0"
          - "(nats_firewall_allowed_services | difference(nats_firewall_runtime_services.stdout.split()) | length) == 0"
          - "(nats_firewall_runtime_ports.stdout.split() | difference(nats_firewall_allowed_ports) | length) == 0"
          - "(nats_firewall_allowed_ports | difference(nats_firewall_runtime_ports.stdout.split()) | length) == 0"
          - "(nats_firewall_runtime_source_ports.stdout.split() | length) == 0"
          - "(nats_firewall_runtime_protocols.stdout.split() | length) == 0"
          - "(nats_firewall_runtime_rich_rules.stdout | trim | length) == 0"
          - "(nats_firewall_runtime_forward_ports.stdout.split() | length) == 0"
          - "'forward: no' in nats_firewall_runtime.stdout"
          - "'masquerade: no' in nats_firewall_runtime.stdout"
      when: nats_manage_firewall | bool

    - name: Validate NATS monitoring health endpoint
      ansible.builtin.uri:
        url: "http://{{ nats_monitor_check_host }}:{{ nats_monitor_port }}/healthz"
        method: GET
        status_code: 200
        return_content: true
      register: nats_health
      changed_when: false

    - name: Show installation summary
      ansible.builtin.debug:
        msg:
          - "Local NATS server {{ nats_version }} installed and running as user '{{ nats_user }}'."
          - "Service is enabled for reboot persistence: systemctl is-enabled nats"
          - "Client endpoint: {{ 'tls' if (nats_tls_enabled | bool) else 'nats' }}://{{ nats_client_host }}:{{ nats_client_port }}"
          - "External NIC/firewall zone: {{ nats_external_interface }} / {{ nats_firewall_zone }}; inbound allowed services={{ nats_firewall_allowed_services }}, ports={{ nats_firewall_allowed_ports }}."
          - "Monitoring endpoint is bound to {{ nats_monitor_host }}:{{ nats_monitor_port }}. It is intentionally not exposed through firewalld by default."
          - "Generated credentials are stored root-only in {{ nats_secret_file }}. Move these to Ansible Vault or your enterprise secret store."
          - "Bootstrap CA for clients, if self-signed TLS is used: {{ nats_tls_ca_file }}"
